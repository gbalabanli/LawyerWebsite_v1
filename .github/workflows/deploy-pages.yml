name: Deploy Astro to gh-pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Resolve deploy env
        run: |
          if [ -f public/CNAME ]; then
            CUSTOM_DOMAIN=$(cat public/CNAME | tr -d '[:space:]')
            echo "Custom domain detected: ${CUSTOM_DOMAIN}"
            echo "BASE_PATH=/" >> "$GITHUB_ENV"
            echo "PUBLIC_SITE_URL=https://${CUSTOM_DOMAIN}" >> "$GITHUB_ENV"
          else
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            OWNER="${GITHUB_REPOSITORY_OWNER}"
            if [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
              echo "BASE_PATH=/" >> "$GITHUB_ENV"
              echo "PUBLIC_SITE_URL=https://${OWNER}.github.io" >> "$GITHUB_ENV"
            else
              echo "BASE_PATH=/${REPO_NAME}" >> "$GITHUB_ENV"
              echo "PUBLIC_SITE_URL=https://${OWNER}.github.io/${REPO_NAME}" >> "$GITHUB_ENV"
            fi
          fi
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npm run build
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
